version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: smart-lekka-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartlekka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-smartlekka}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartlekka}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: smart-lekka-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-smartlekka}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartlekka}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      BASE_PATH: /api
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

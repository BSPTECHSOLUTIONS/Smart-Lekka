<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Smart Lekka</title>
    <link rel="icon" type="image/png" href="/smart-lekka-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #app-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      /* Wrapper holds ring + logo stacked */
      #app-splash .logo-wrap {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Spinning ring around the logo */
      #app-splash .logo-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid transparent;
        border-top-color: #1e40af;
        border-right-color: #3b82f6;
        animation: ring-spin 1.1s linear infinite;
      }
      /* Logo itself — completely still */
      #app-splash img {
        width: 88px;
        height: 88px;
        object-fit: contain;
        filter: drop-shadow(0 2px 10px rgba(30,64,175,0.15));
      }
      #app-splash p {
        font-family: Inter, sans-serif;
        font-size: 14px;
        color: #64748b;
        letter-spacing: 0.04em;
        font-weight: 500;
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      @keyframes ring-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.45; }
        50%       { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash">
      <div class="logo-wrap">
        <img src="/smart-lekka-logo.png" alt="Smart Lekka" />
      </div>
      <p>Loading Smart Lekka…</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

kind = "web"
previewPath = "/"
title = "Tractor Work Tracker"
version = "1.0.0"
id = "artifacts/tractor-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24292

[services.development]
run = "pnpm --filter @workspace/tractor-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tractor-tracker", "run", "build" ]
publicDir = "artifacts/tractor-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24292"
BASE_PATH = "/"
